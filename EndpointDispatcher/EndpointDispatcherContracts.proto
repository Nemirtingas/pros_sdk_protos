syntax = "proto3";

import "Options.proto";

package Hydra.Api.EndpointDispatcher;

enum EnvironmentStatus {
  ENVIRONMENT_STATUS_UNKNOWN = 0;
  ENVIRONMENT_STATUS_READY = 1;
  ENVIRONMENT_STATUS_MAINTENANCE = 2;
}

enum EndpointScheme {
  ENDPOINT_SCHEME_SECURED = 0;
  ENDPOINT_SCHEME_UNSECURED = 1;
  ENDPOINT_SCHEME_UDP = 2;
}

message GetEnvironmentInfoRequest {
  ServiceIdentity authorization = 1;
  TitleIdentity title = 2;
  string build_version = 3;
}

message GetEnvironmentInfoResponse {
  int64 date = 1;
  EnvironmentInfo environment = 2;
}

message ServiceIdentity {
  string name = 1;
  ServiceVersion version = 2;
}

message TitleIdentity {
  string title_id = 1;
  string title_secret = 2;
}

message EndpointInfo {
  string name = 1;
  string ip = 2;
  int32 port = 3;
  EndpointScheme scheme = 4;
  ServiceVersion version = 5;
}

message EnvironmentInfo {
  string id = 1;
  EnvironmentStatus status = 2;
  EndpointInfo endpoint = 3;
}

