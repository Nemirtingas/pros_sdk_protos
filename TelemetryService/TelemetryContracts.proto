syntax = "proto3";

import "Context/UserContext.proto";
import "Context/ServerContext.proto";

package Pros.Api.Telemetry;

enum TelemetryPackFormat {
  TELEMETRY_PACK_FORMAT_UNKNOWN = 0;
  TELEMETRY_PACK_FORMAT_JSON_BASED = 1;
}

enum TelemetryPackCompression {
  TELEMETRY_PACK_COMPRESSION_NONE = 0;
  TELEMETRY_PACK_COMPRESSION_ZLIB = 1;
  TELEMETRY_PACK_COMPRESSION_GZIP = 2;
}

enum OptionalTelemetryState {
  OPTIONAL_TELEMETRY_STATE_UNSPECIFIED = 0;
  OPTIONAL_TELEMETRY_STATE_OFF = 1;
  OPTIONAL_TELEMETRY_STATE_CONSENT_REQUIRED = 2;
  OPTIONAL_TELEMETRY_STATE_ACCEPTED = 3;
  OPTIONAL_TELEMETRY_STATE_DECLINED = 4;
}

enum TelemetryEventTypesFilter {
  TELEMETRY_EVENT_TYPES_FILTER_UNSPECIFIED = 0;
  TELEMETRY_EVENT_TYPES_FILTER_DISABLED = 1;
  TELEMETRY_EVENT_TYPES_FILTER_RESTRICTED_LIST = 2;
  TELEMETRY_EVENT_TYPES_FILTER_ALLOWED_LIST = 3;
}

message TelemetryConfig {
  repeated string restricted_event_types = 1;
  int32 recommended_upload_interval_sec = 2;
  repeated string priority_event_types = 3;
  int32 event_max_length = 4;
  int32 events_rate_per_sec = 5;
  repeated string allowed_event_types = 6;
  Pros.Api.Telemetry.TelemetryEventTypesFilter filter_mode = 7;
  Pros.Api.Telemetry.OptionalTelemetryState optional_telemetry_state = 8;
}

message SetOptionalTelemetryStateRequest {
  Hydra.Api.Infrastructure.Context.UserContext user_context = 1;
  bool is_accepted = 2;
}

message SetOptionalTelemetryStateResponse {
  Pros.Api.Telemetry.TelemetryConfig telemetry_config = 1;
}

message SendPackRequest {
  Hydra.Api.Infrastructure.Context.UserContext user_context = 1;
  Pros.Api.Telemetry.TelemetryPack pack = 2;
}

message SendPackResponse {
}

message SendServerPackRequest {
  Hydra.Api.Infrastructure.Context.ServerContext server_context = 1;
  Pros.Api.Telemetry.TelemetryPack pack = 2;
}

message SendServerPackResponse {
}

message TelemetryPack {
  Pros.Api.Telemetry.TelemetryPackHeader header = 1;
  bytes entries = 2;
  bytes data = 3;
  int32 event_generation = 4;
  Pros.Api.Telemetry.OfflineContext offline_context = 5;
}

message OfflineContext {
  oneof offline_context_data {
    Hydra.Api.Infrastructure.Context.UserContextData user_context_data = 1;
    Hydra.Api.Infrastructure.Context.ServerContextData server_context_data = 2;
    string user_identity = 3;
  }
}

message TelemetryPackHeader {
  repeated Pros.Api.Telemetry.TelemetryContext context = 1;
  int32 pack_number = 2;
  int64 start_time = 3;
  int64 end_time = 4;
  int64 init_time = 5;
  Pros.Api.Telemetry.TelemetryPackFormat format = 7;
  Pros.Api.Telemetry.TelemetryPackFormatVersion version = 8;
  Pros.Api.Telemetry.TelemetryPackOptions options = 9;
}

message TelemetryPackOptions {
  bool is_local_time = 2;
  Pros.Api.Telemetry.TelemetryPackCompression compression = 4;
}

message TelemetryContext {
  string property_name = 1;
  string property_value = 2;
}

message TelemetryPackFormatVersion {
  int32 major = 1;
  int32 minor = 2;
}

message TelemetryEventBaseEntry {
  string event_type = 1;
  string event_uid = 2;
  int32 version = 3;
  string json_params = 4;
}