syntax = "proto3";

package Hydra.Api.Challenges;

enum ChallengeUpdateType {
  CHALLENGE_UPDATE_TYPE_NONE = 0;
  CHALLENGE_UPDATE_TYPE_FULL = 1;
  CHALLENGE_UPDATE_TYPE_INCREMENTAL = 2;
  CHALLENGE_UPDATE_TYPE_FILTERED = 3;
}

enum ChallengeType {
  CHALLENGE_TYPE_NONE = 0;
  CHALLENGE_TYPE_DAILY = 1;
  CHALLENGE_TYPE_STATIC = 2;
}

enum ChallengeState {
  CHALLENGE_STATE_NONE = 0;
  CHALLENGE_STATE_ACTIVATED = 1;
  CHALLENGE_STATE_COMPLETED = 2;
  CHALLENGE_STATE_EXPIRED = 3;
  CHALLENGE_STATE_REWARDED = 4;
}

enum ChallengeCounterFilterOperationType {
  CHALLENGE_COUNTER_FILTER_OPERATION_TYPE_NONE = 0;
  CHALLENGE_COUNTER_FILTER_OPERATION_TYPE_EQUAL = 1;
  CHALLENGE_COUNTER_FILTER_OPERATION_TYPE_NOT_EQUAL = 2;
}

enum ChallengeOperationType {
  CHALLENGE_OPERATION_TYPE_NONE = 0;
  CHALLENGE_OPERATION_TYPE_INCREASE = 1;
  CHALLENGE_OPERATION_TYPE_RESET = 2;
}

enum ChallengeRewardType {
  CHALLENGE_REWARD_TYPE_NONE = 0;
  CHALLENGE_REWARD_TYPE_OFFER = 1;
}

message UserChallengesIncrementalUpdate {
  Hydra.Api.Challenges.ChallengeUpdateType update_type = 1;
  repeated Hydra.Api.Challenges.Challenge challenges = 2;
  repeated string removed_challenges = 3;
  uint64 current_tick = 4;
  uint64 current_tick_expiration_sec = 5;
  repeated Hydra.Api.Challenges.ChallengeDailySlotInfo daily_slot_info = 6;
}

message UserChallengesUpdateVersion {
  int32 version = 1;
  int64 from_challenges_version = 2;
  int64 to_challenges_version = 3;
  Hydra.Api.Challenges.UserChallengesIncrementalUpdate update = 4;
}

message UserChallengesInfo {
  repeated Hydra.Api.Challenges.Challenge challenges = 1;
  uint64 current_tick = 2;
  uint64 current_tick_expiration_sec = 3;
  repeated Hydra.Api.Challenges.ChallengeDailySlotInfo daily_slot_info = 4;
}

message Challenge {
  string challenge_id = 1;
  string definition = 2;
  Hydra.Api.Challenges.ChallengeType type = 3;
  Hydra.Api.Challenges.ChallengeState state = 4;
  int32 slot = 5;
  uint32 tick = 6;
  repeated Hydra.Api.Challenges.ChallengeCounterWithEvents counters_with_events = 8;
  repeated Hydra.Api.Challenges.ChallengeReward rewards = 9;
}

message ChallengeCounterFilterItem {
  string name = 1;
  string value = 2;
  Hydra.Api.Challenges.ChallengeCounterFilterOperationType operation = 3;
}

message ChallengeEvent {
  string event_name = 1;
  Hydra.Api.Challenges.ChallengeOperationType operation = 2;
  repeated Hydra.Api.Challenges.ChallengeCounterFilterItem event_filter = 3;
  uint64 value = 4;
}

message ChallengeCounterWithEvents {
  string challenge_counter_id = 1;
  repeated Hydra.Api.Challenges.ChallengeEvent events = 2;
  uint64 value = 3;
  uint64 goal = 4;
  repeated uint64 milestones = 5;
}

message ChallengeOperationList {
  string user_id = 1;
  repeated Hydra.Api.Challenges.ChallengeCounterOperation operations = 2;
}

message ChallengePerUserCompletedUpdate {
  string user_id = 1;
  repeated Hydra.Api.Challenges.Challenge completed_challenges = 2;
}

message ChallengeCounterOperation {
  string challenge_counter_id = 1;
  Hydra.Api.Challenges.ChallengeOperationType operation_type = 2;
  uint64 value = 3;
}

message ChallengeDailySlotInfo {
  int32 available_recharge_count = 1;
  int32 remaining_cooldown_sec = 2;
  uint64 daily_slot_expiration_in_sec = 3;
}

message ChallengeReward {
  Hydra.Api.Challenges.ChallengeRewardType reward_type = 1;
  string reward_id = 2;
}