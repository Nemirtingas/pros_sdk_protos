syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "Context/UserContext.proto";
import "Context/ServerContext.proto";

package Hydra.Api.Rating;

enum MatchResult {
  MATCH_RESULT_NONE = 0;
  MATCH_RESULT_WIN = 1;
  MATCH_RESULT_LOSE = 2;
}

message UserRatingHistory {
  int32 games_count = 1;
  double rating = 2;
  string session_id = 3;
  google.protobuf.Timestamp time = 4;
  string custom_data = 5;
  Hydra.Api.Rating.MatchResult result = 6;
}

message RatingData {
  double rating = 1;
  int32 games_count = 2;
  repeated Hydra.Api.Rating.UserRatingHistory history = 4;
}

message UserRating {
  string user_id = 1;
  Hydra.Api.Rating.RatingData data = 2;
}

message UserRatingInfo {
  string rating_id = 1;
  Hydra.Api.Rating.RatingData data = 2;
}

message UserIndividualResult {
  string user_id = 1;
  int32 user_place_in_game = 2;
  string custom_data = 3;
  string rating_id = 4;
}

message UserTeamResult {
  string user_id = 1;
  int32 user_place_in_team = 2;
  int32 team_place_in_game = 3;
  string custom_data = 4;
  int32 team_id = 5;
  string rating_id = 6;
}

message SessionIndividualResult {
  repeated Hydra.Api.Rating.UserIndividualResult results = 1;
}

message SessionTeamResult {
  repeated Hydra.Api.Rating.UserTeamResult results = 1;
}

message RatingUpdate {
  oneof result {
    Hydra.Api.Rating.SessionIndividualResult individual_results = 2;
    Hydra.Api.Rating.SessionTeamResult team_results = 3;
  }
}

message GetRatingsUserRequest {
  Hydra.Api.Infrastructure.Context.UserContext context = 1;
  string rating_id = 2;
  bool include_history = 3;
  repeated string user_ids = 4;
}

message GetRatingsUserResponse {
  repeated Hydra.Api.Rating.UserRating ratings = 1;
}

message GetRatingsServerRequest {
  Hydra.Api.Infrastructure.Context.ServerContext context = 1;
  string rating_id = 2;
  bool include_history = 3;
  repeated string user_ids = 4;
}

message GetRatingsServerResponse {
  repeated Hydra.Api.Rating.UserRating ratings = 1;
}

message GetServiceRatingsRequest {
  string title_id = 1;
  string rating_id = 2;
  repeated string user_ids = 3;
}

message UpdateRatingsServerRequest {
  Hydra.Api.Infrastructure.Context.ServerContext context = 1;
  string rating_id = 2;
  Hydra.Api.Rating.RatingUpdate update = 3;
}

message UpdateRatingsServerResponse {
}

message UpdateRatingsUserRequest {
  Hydra.Api.Infrastructure.Context.UserContext context = 1;
  string session_id = 2;
  string rating_id = 3;
  Hydra.Api.Rating.RatingUpdate update = 4;
}

message UpdateRatingsUserResponse {
}

message CustomRatingUpdate {
  string user_id = 1;
  double rating = 2;
  string custom_data = 3;
  Hydra.Api.Rating.MatchResult result = 4;
}

message UpdateCustomRatingsServerRequest {
  Hydra.Api.Infrastructure.Context.ServerContext context = 1;
  string rating_id = 2;
  repeated Hydra.Api.Rating.CustomRatingUpdate update = 3;
}

message UpdateCustomRatingsServerResponse {
}

message UpdateCustomRatingsUserRequest {
  Hydra.Api.Infrastructure.Context.UserContext context = 1;
  string session_id = 2;
  string rating_id = 3;
  repeated Hydra.Api.Rating.CustomRatingUpdate update = 4;
}

message UpdateCustomRatingsUserResponse {
}

message GetOwnRatingRequest {
  Hydra.Api.Infrastructure.Context.UserContext context = 1;
  repeated string rating_ids = 2;
  bool include_history = 3;
}

message GetOwnRatingResponse {
  repeated Hydra.Api.Rating.UserRatingInfo user_ratings = 1;
}