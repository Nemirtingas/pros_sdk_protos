syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "Leaderboards/LeaderboardsContracts.proto";
import "Context/UserContext.proto";

package Hydra.Api.Zen.ZenTournaments;

enum TournamentType {
  TOURNAMENT_TYPE_NONE = 0;
  TOURNAMENT_TYPE_PREDEFINED = 1;
  TOURNAMENT_TYPE_AUTO_GENERATED = 2;
  TOURNAMENT_TYPE_USER_GENERATED = 3;
}

enum TournamentPlayLimitType {
  TOURNAMENT_PLAY_LIMIT_TYPE_NONE = 0;
  TOURNAMENT_PLAY_LIMIT_TYPE_DAY = 1;
  TOURNAMENT_PLAY_LIMIT_TYPE_TOTAL = 2;
}

enum TournamentFilterPlayed {
  TOURNAMENT_FILTER_PLAYED_NONE = 0;
  TOURNAMENT_FILTER_PLAYED_TRUE = 1;
  TOURNAMENT_FILTER_PLAYED_FALSE = 2;
}

enum TournamentFilterPlayLimit {
  TOURNAMENT_FILTER_PLAY_LIMIT_NONE = 0;
  TOURNAMENT_FILTER_PLAY_LIMIT_UNLIMITED = 1;
  TOURNAMENT_FILTER_PLAY_LIMIT_LIMITED = 2;
}

enum TournamentFilterPasswordProtected {
  TOURNAMENT_FILTER_PASSWORD_PROTECTED_NONE = 0;
  TOURNAMENT_FILTER_PASSWORD_PROTECTED_TRUE = 1;
  TOURNAMENT_FILTER_PASSWORD_PROTECTED_FALSE = 2;
}

enum TournamentFilterState {
  TOURNAMENT_FILTER_STATE_NONE = 0;
  TOURNAMENT_FILTER_STATE_ACTIVE = 1;
  TOURNAMENT_FILTER_STATE_FINISHED = 2;
}

enum TournamentSortOrder {
  TOURNAMENT_SORT_ORDER_NONE = 0;
  TOURNAMENT_SORT_ORDER_ASCENDING = 1;
  TOURNAMENT_SORT_ORDER_DESCENDING = 2;
}

enum TournamentSortField {
  TOURNAMENT_SORT_FIELD_NONE = 0;
  TOURNAMENT_SORT_FIELD_PLAYERS_COUNT = 1;
  TOURNAMENT_SORT_FIELD_TIME_LEFT = 2;
}

enum PostTournamentResultType {
  POST_TOURNAMENT_RESULT_TYPE_NONE = 0;
  POST_TOURNAMENT_RESULT_TYPE_LIMIT_REACHED = 1;
  POST_TOURNAMENT_RESULT_TYPE_PARTICIPANTS_LIMIT_REACHED = 2;
  POST_TOURNAMENT_RESULT_TYPE_UPDATED = 3;
  POST_TOURNAMENT_RESULT_TYPE_OK = 4;
}

enum TournamentStateFilter {
  TOURNAMENT_STATE_FILTER_NONE = 0;
  TOURNAMENT_STATE_FILTER_SCHEDULED = 1;
  TOURNAMENT_STATE_FILTER_RUNING = 2;
  TOURNAMENT_STATE_FILTER_FINISHED = 4;
  TOURNAMENT_STATE_FILTER_ALL = 7;
}

message TournamentPlayLimit {
  TournamentPlayLimitType limit_type = 1;
  int32 limit_value = 2;
}

message TournamentReward {
  double percents_bound = 1;
  string offer_id = 2;
}

message TournamentSettings {
  Timestamp starts_on = 1;
  Duration duration = 2;
  string properties = 3;
  TournamentPlayLimit play_limit = 4;
  int32 participants_limit = 5;
  string cdn_data = 6;
  repeated TournamentReward rewards = 7;
}

message TournamentCreateData {
  string title_id = 1;
  bool is_visible = 2;
  Duration ttl = 3;
  TournamentSettings settings = 4;
  string name = 5;
}

message CreateTournamentRequest {
  TournamentCreateData create_data = 1;
}

message CreateTournamentResponse {
  TournamentData tournament = 1;
}

message CreateAutoGeneratedTournamentRequest {
  TournamentCreateData create_data = 1;
}

message CreateAutoGeneratedTournamentResponse {
  TournamentData tournament = 1;
}

message SetTournamentVisibilityRequest {
  string tournament_id = 1;
  bool is_visible = 2;
}

message SetTournamentVisibilityResponse {
  TournamentData tournament = 1;
}

message SetTournamentCdnDataRequest {
  string tournament_id = 1;
  string cdn_data = 2;
}

message SetTournamentCdnDataResponse {
  TournamentData tournament = 1;
}

message DeleteTournamentRequest {
  string tournament_id = 1;
}

message DeleteTournamentResponse {
}

message TournamentPublicData {
  int32 total_count = 1;
  LeaderboardEntry top1 = 2;
}

message ClientTournamentData {
  string tournament_id = 1;
  string tournament_leaderboard_id = 2;
  TournamentSettings settings = 3;
  TournamentPublicData public_data = 4;
  LeaderboardEntry leaderboard_entry = 5;
  TournamentType tournament_type = 6;
  string tournament_hash = 7;
  bool is_password_protected = 8;
  string owner_user_id = 9;
}

message TournamentData {
  string tournament_id = 1;
  string tournament_leaderboard_id = 2;
  TournamentCreateData create_data = 3;
  TournamentPublicData public_data = 4;
  TournamentType tournament_type = 6;
  string tournament_hash = 7;
  bool is_password_protected = 8;
  string owner_user_id = 9;
}

message KeyValue {
  string key = 1;
  string value = 2;
}

message KeyValues {
  string key = 1;
  repeated string values = 2;
}

message ClientGetTournamentsRequest {
  UserContext context = 1;
  repeated KeyValue filter_properties = 2;
  repeated string filter_tags = 3;
  int32 start_position = 4;
  int32 results_count = 5;
  TournamentType filter_tournament_type = 6;
}

message TournamentFilterTimeLeft {
  Duration from = 1;
  Duration to = 2;
}

message TournamentSortBy {
  TournamentSortField sort_field = 1;
  TournamentSortOrder sort_order = 2;
}

message ClientGetTournamentsSortedRequest {
  UserContext context = 1;
  repeated KeyValues filter_properties = 2;
  repeated string filter_tags = 3;
  TournamentFilterPlayed filter_played = 4;
  TournamentFilterPlayLimit filter_play_limit = 5;
  TournamentFilterTimeLeft filter_time_left = 6;
  TournamentFilterState filter_state = 7;
  TournamentSortBy sort_by = 8;
  int32 start_position = 9;
  int32 results_count = 10;
  TournamentType filter_tournament_type = 11;
  TournamentFilterPasswordProtected filter_password = 12;
}

message ClientGetTournamentsByHashRequest {
  UserContext context = 1;
  string tournament_hash = 2;
}

message ClientGetTournamentsByHashResponse {
  repeated ClientTournamentData tournaments = 1;
}

message ClientGetCreatedTournamentsRequest {
  UserContext context = 1;
}

message ClientGetCreatedTournamentsResponse {
  repeated ClientTournamentData tournaments = 1;
}

message ClientCreateTournamentRequest {
  UserContext context = 1;
  Duration duration = 2;
  string properties = 3;
  TournamentPlayLimit play_limit = 4;
  int32 participants_limit = 5;
  string password = 6;
}

message ClientCreateTournamentResponse {
  ClientTournamentData tournament = 1;
}

message ClientGetTournamentsSortedResponse {
  repeated ClientTournamentData tournaments = 1;
  int32 total_count = 2;
}

message ClientGetTournamentsResponse {
  repeated ClientTournamentData tournaments = 1;
  int32 total_count = 2;
}

message ClientPostTournamentResultRequest {
  UserContext context = 1;
  string tournament_id = 2;
  double value = 3;
  string password = 4;
}

message ClientPostTournamentAttemptIncrementRequest {
  UserContext context = 1;
  string tournament_id = 2;
  string reference_id = 3;
  string password = 4;
}

message ClientPostTournamentAttemptIncrementResponse {
  ClientTournamentData tournament = 1;
  PostTournamentResultType result_type = 2;
  string attempt_key = 3;
}

message ClientPostTournamentAttemptResultRequest {
  UserContext context = 1;
  string attempt_key = 2;
  double value = 3;
}

message ClientPostTournamentAttemptResultResponse {
  ClientTournamentData tournament = 1;
  PostTournamentResultType result_type = 2;
}

message ClientPostTournamentResultResponse {
  ClientTournamentData tournament = 1;
  PostTournamentResultType result_type = 2;
}

message GetTournamentsRequest {
  string title_id = 1;
  TournamentStateFilter state_filter = 2;
  int32 start_position = 3;
  int32 results_count = 4;
  TournamentType filter_tournament_type = 5;
  TournamentSortBy sort_by = 6;
}

message GetTournamentsResponse {
  repeated TournamentData tournaments = 1;
  int32 total_count = 2;
}

message GetTournamentRequest {
  string tournament_id = 1;
}

message GetTournamentResponse {
  TournamentData tournament = 1;
}

message GetCreatedTournamentsRequest {
  string title_id = 1;
  string user_id = 2;
}

message GetCreatedTournamentsResponse {
  repeated TournamentData tournaments = 1;
}

message GetTournamentsSchemaAndSampleJsonRequest {
}

message GetTournamentsSchemaAndSampleJsonResponse {
  string json_schema = 1;
  string sample_json = 2;
}

message GetUserCreatedTournamentsRequest {
  string title_id = 1;
  string user_id = 2;
}

message GetUserCreatedTournamentsResponse {
  repeated TournamentData tournaments = 1;
}

