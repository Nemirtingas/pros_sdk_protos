syntax = "proto3";

import "google/protobuf/descriptor.proto";

package Hydra.Api.Infrastructure;

enum UserBanScope {
  USER_BAN_SCOPE_UNKNOWN = 0;
  USER_BAN_SCOPE_PERMANENT = 1;
  USER_BAN_SCOPE_CHEATING = 2;
  USER_BAN_SCOPE_CHAT_MUTE = 4;
  USER_BAN_SCOPE_MATCHMAKING = 8;
}

message ServiceAttribute {
  Hydra.Api.Infrastructure.ServiceVersion version = 1;
  string access_role = 2;
  string scope = 3;
  Hydra.Api.Infrastructure.BanScope ban_scope = 4;
  Hydra.Api.Infrastructure.ServiceFeature feature = 5;
}

message MethodAttribute {
  string access_role = 1;
  string scope = 2;
  Hydra.Api.Infrastructure.BanScope ban_scope = 4;
}

message ServiceFeature {
  string name = 1;
}

message ServiceVersion {
  int32 major = 1;
  int32 minor = 2;
  string hash = 3;
}

message BanScope {
  repeated Hydra.Api.Infrastructure.UserBanScope scope = 1;
  bool delayed_ban = 2;
}