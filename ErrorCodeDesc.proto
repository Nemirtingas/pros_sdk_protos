syntax = "proto3";

import "google/protobuf/descriptor.proto";

package Pros.Global.Api.Errors;

enum ErrorCategory {
  ERROR_CATEGORY_CRITICAL = 0;
  ERROR_CATEGORY_FATAL = 1;
  ERROR_CATEGORY_TERMINAL = 2;
  ERROR_CATEGORY_NONE = 3;
}

enum ErrorSeverity {
  ERROR_SEVERITY_UNDEFINED = 0;
  ERROR_SEVERITY_FATAL = 1;
  ERROR_SEVERITY_CRITICAL = 2;
  ERROR_SEVERITY_MAJOR = 3;
  ERROR_SEVERITY_MINOR = 4;
  ERROR_SEVERITY_EXPECTED = 5;
}

enum ErrorClientSet {
  ERROR_CLIENT_SET_UNDEFINED = 0;
  ERROR_CLIENT_SET_DEFAULT = 1;
  ERROR_CLIENT_SET_AUTHORIZATION = 2;
  ERROR_CLIENT_SET_INVISIBLE = 5;
  ERROR_CLIENT_SET_ACCOUNT = 10;
  ERROR_CLIENT_SET_BANNERS = 11;
  ERROR_CLIENT_SET_CONTAINER_TRANSFER = 12;
  ERROR_CLIENT_SET_CROSS_SAVES = 13;
  ERROR_CLIENT_SET_ENTITLEMENTS = 14;
  ERROR_CLIENT_SET_MODS = 15;
  ERROR_CLIENT_SET_PROFANITY_FILTER = 16;
  ERROR_CLIENT_SET_ABSTRACT_DATA = 30;
  ERROR_CLIENT_SET_CHALLENGES = 31;
  ERROR_CLIENT_SET_FRIENDS = 32;
  ERROR_CLIENT_SET_SESSION_CONTROL = 33;
  ERROR_CLIENT_SET_GAME_CONFIGURATION = 34;
  ERROR_CLIENT_SET_LEADERBOARDS = 35;
  ERROR_CLIENT_SET_MESSAGING = 36;
  ERROR_CLIENT_SET_PRESENCE = 37;
  ERROR_CLIENT_SET_PRIVACY = 38;
  ERROR_CLIENT_SET_RATINGS = 39;
  ERROR_CLIENT_SET_BANS = 40;
  ERROR_CLIENT_SET_ECONOMY = 41;
  ERROR_CLIENT_SET_UTILITY = 42;
  ERROR_CLIENT_SET_REPORTS = 43;
  ERROR_CLIENT_SET_TAG = 44;
  ERROR_CLIENT_SET_TURN = 45;
}

message ErrorCodeDesc {
  string error_text = 1;
  Pros.Global.Api.Errors.ErrorSeverity error_severity = 2;
  Pros.Global.Api.Errors.ErrorCategory error_category = 3;
  Pros.Global.Api.Errors.ErrorClientSet error_client_set = 4;
}