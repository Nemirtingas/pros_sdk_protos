syntax = "proto3";

import "Options.proto";
import "ProsLeaderboards/ProsLeaderboardsContracts.proto";

package Pros.Api.ProsLeaderboards;

service ProsLeaderboardsApi {
  rpc GetLeaderboardsCatalog (GetLeaderboardsCatalogRequest) returns (GetLeaderboardsCatalogResponse);
  rpc GetLeaderboardEntries (GetLeaderboardEntriesRequest) returns (GetLeaderboardEntriesResponse);
  rpc GetLeaderboards (GetLeaderboardsRequest) returns (GetLeaderboardsResponse);
  rpc UpdateLeaderboards (UpdateLeaderboardsRequest) returns (UpdateLeaderboardsResponse);
}