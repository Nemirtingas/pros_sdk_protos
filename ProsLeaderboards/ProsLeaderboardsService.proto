syntax = "proto3";

import "Options.proto";
import "ProsLeaderboards/ProsLeaderboardsContracts.proto";

package Pros.Api.ProsLeaderboards;

service ProsLeaderboardsApi {
  rpc GetLeaderboardsCatalog (GetLeaderboardsCatalogRequest) returns (GetLeaderboardsCatalogResponse);
  rpc GetLeaderboardsUserEntries (GetLeaderboardsUserEntriesRequest) returns (GetLeaderboardsUserEntriesResponse);
  rpc GetLeaderboardsEntityEntries (GetLeaderboardsEntityEntriesRequest) returns (GetLeaderboardsEntityEntriesResponse);
  rpc UpdateLeaderboardsEntries (UpdateLeaderboardsEntriesRequest) returns (UpdateLeaderboardsEntriesResponse);
  rpc UpdateGameClientLeaderboardsEntries (UpdateGameClientLeaderboardsEntriesRequest) returns (UpdateGameClientLeaderboardsEntriesResponse);
}