syntax = "proto3";

import "Options.proto";
import "Presence/PresenceServiceContracts.proto";

package Hydra.Api.Presence;

service PresenceApi {
  rpc Connect (ConnectRequest) returns (ConnectResponse);
  rpc Disconnect (DisconnectRequest) returns (DisconnectResponse);
  rpc GetUsersPresence (GetUsersPresenceRequest) returns (GetUsersPresenceResponse);
  rpc PartyCreate (PartyCreateRequest) returns (PartyCreateResponse);
  rpc PartySetSettings (PartySetSettingsRequest) returns (PartySetSettingsResponse);
  rpc PartySetData (PartySetDataRequest) returns (PartySetDataResponse);
  rpc PartySetMemberData (PartySetMemberDataRequest) returns (PartySetMemberDataResponse);
  rpc PartyInviteSend (PartyInviteSendRequest) returns (PartyInviteSendResponse);
  rpc PartyInviteRevoke (PartyInviteRevokeRequest) returns (PartyInviteRevokeResponse);
  rpc PartyInviteAccept (PartyInviteAcceptRequest) returns (PartyInviteAcceptResponse);
  rpc PartyInviteReject (PartyInviteRejectRequest) returns (PartyInviteRejectResponse);
  rpc PartyJoin (PartyJoinRequest) returns (PartyJoinResponse);
  rpc PartyLeave (PartyLeaveRequest) returns (PartyLeaveResponse);
  rpc PartyRemoveMember (PartyRemoveMembersRequest) returns (PartyRemoveMembersResponse);
  rpc PartySetOwner (PartySetOwnerRequest) returns (PartySetOwnerResponse);
  rpc PartyDisband (PartyDisbandRequest) returns (PartyDisbandResponse);
  rpc PartyGenerateJoinCode (PartyGenerateJoinCodeRequest) returns (PartyGenerateJoinCodeResponse);
  rpc PartyClearJoinCode (PartyClearJoinCodeRequest) returns (PartyClearJoinCodeResponse);
  rpc PartyUseJoinCode (PartyUseJoinCodeRequest) returns (PartyUseJoinCodeResponse);
  rpc MatchmakeStart (MatchmakeStartRequest) returns (MatchmakeStartResponse);
  rpc MatchmakeRestart (MatchmakeRestartRequest) returns (MatchmakeRestartResponse);
  rpc MatchmakeStop (MatchmakeStopRequest) returns (MatchmakeStopResponse);
  rpc MatchmakeSessionCreate (MatchmakeSessionCreateRequest) returns (MatchmakeSessionCreateResponse);
  rpc MatchmakeSessionSetSettings (MatchmakeSessionSetSettingsRequest) returns (MatchmakeSessionSetSettingsResponse);
  rpc MatchmakeSessionSetVariants (MatchmakeSessionSetVariantsRequest) returns (MatchmakeSessionSetVariantsResponse);
  rpc MatchmakeSessionSetQueueVariants (MatchmakeSessionSetQueueVariantsRequest) returns (MatchmakeSessionSetQueueVariantsResponse);
  rpc MatchmakeSessionSetData (MatchmakeSessionSetDataRequest) returns (MatchmakeSessionSetDataResponse);
  rpc MatchmakeSessionSetMemberData (MatchmakeSessionSetMemberDataRequest) returns (MatchmakeSessionSetMemberDataResponse);
  rpc MatchmakeSessionJoin (MatchmakeSessionJoinRequest) returns (MatchmakeSessionJoinResponse);
  rpc MatchmakeSessionLeave (MatchmakeSessionLeaveRequest) returns (MatchmakeSessionLeaveResponse);
  rpc MatchmakeSessionRemoveMembers (MatchmakeSessionRemoveMembersRequest) returns (MatchmakeSessionRemoveMembersResponse);
  rpc MatchmakeSessionTerminate (MatchmakeSessionTerminateRequest) returns (MatchmakeSessionTerminateResponse);
  rpc MatchmakeSessionSetOwner (MatchmakeSessionSetOwnerRequest) returns (MatchmakeSessionSetOwnerResponse);
  rpc MatchmakeSessionPendingAccept (MatchmakeSessionPendingAcceptRequest) returns (MatchmakeSessionPendingAcceptResponse);
  rpc MatchmakeSessionPendingDecline (MatchmakeSessionPendingDeclineRequest) returns (MatchmakeSessionPendingDeclineResponse);
  rpc MatchmakeSessionChangeTeam (MatchmakeSessionChangeTeamRequest) returns (MatchmakeSessionChangeTeamResponse);
  rpc MatchmakeSessionChangeClassRole (MatchmakeSessionChangeClassRoleRequest) returns (MatchmakeSessionChangeClassRoleResponse);
  rpc MatchmakeSessionGetInfo (MatchmakeSessionGetInfoRequest) returns (MatchmakeSessionGetInfoResponse);
  rpc MatchmakeSessionGenerateJoinCode (MatchmakeSessionGenerateJoinCodeRequest) returns (MatchmakeSessionGenerateJoinCodeResponse);
  rpc MatchmakeSessionClearJoinCode (MatchmakeSessionClearJoinCodeRequest) returns (MatchmakeSessionClearJoinCodeResponse);
  rpc MatchmakeSessionUseJoinCode (MatchmakeSessionUseJoinCodeRequest) returns (MatchmakeSessionUseJoinCodeResponse);
  rpc UserGetPendingSession (UserGetPendingSessionRequest) returns (UserGetPendingSessionResponse);
  rpc UserGetPenaltyInfo (UserGetPenaltyInfoRequest) returns (UserGetPenaltyInfoResponse);
  rpc MatchmakeBrowseSessions (MatchmakeBrowseSessionsRequest) returns (MatchmakeBrowseSessionsResponse);
}