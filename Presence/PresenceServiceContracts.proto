package Hydra.Api.Presence;

enum PenaltyReason {
  PENALTY_REASON_NONE = 0;
  PENALTY_REASON_SESSION_LEAVE = 1;
  PENALTY_REASON_SESSION_PENDING = 2;
}

message ConnectRequest {
  Hydra.Api.Infrastructure.Context.UserContext context = 1;
  Hydra.Api.Push.PushToken push_token = 2;
  string client_version = 3;
  string static_property = 4;
}

message PendingSession {
  google.protobuf.Duration timer = 1;
  string session_id = 2;
}

message PenaltyInfo {
  google.protobuf.Duration timer = 1;
  Hydra.Api.Presence.PenaltyReason reason = 2;
}

message ConnectResponse {
  Hydra.Api.Presence.PendingSession pending_session = 1;
  Hydra.Api.Presence.PenaltyInfo penalty_info = 2;
}

