syntax = "proto3";

import "Presence/PartyStatus.proto";
import "Presence/MatchmakeStatus.proto";
import "Presence/InviteData.proto";
import "Context/UserContext.proto";
import "Push/PushToken.proto";
import "EndpointDispatcher/EndpointDispatcherContracts.proto";

package Hydra.Api.Presence;

message ConnectRequest {
  UserContext context = 1;
  PushToken push_token = 2;
  string client_version = 3;
  string static_property = 4;
}

message ConnectResponse {
}

