syntax = "proto3";

import "SessionControl/DataCenterEchoEndpoints.proto";
import "SessionControl/MemberEvent.proto";
import "SessionControl/ServerInfo.proto";
import "Context/UserContext.proto";
import "Context/ServerContext.proto";
import "Presence/MatchmakeStatus.proto";
import "Nullable/Nullable.proto";
import "Push/Presence/Presence.proto";
import "ContinuationToken/ContinuationToken.proto";

package Hydra.Api.SessionControl;

message CreateSessionRequest {
  Hydra.Api.Infrastructure.Context.UserContext user_context = 1;
  string data_center_id = 2;
  string client_version = 3;
  string server_data = 4;
}

message CreateSessionResponse {
  string game_session_id = 1;
}

message GetServerInfoRequest {
  Hydra.Api.Infrastructure.Context.UserContext user_context = 1;
  string game_session_id = 2;
  string s_c_context = 3;
}

message GetServerInfoResponse {
  Hydra.Api.SessionControl.AcceptClientResult accept_client_result = 1;
  int32 refresh_after_seconds = 2;
}

message PrepareActivateSessionRequest {
  string server_token = 1;
}

message PrepareActivateSessionResponse {
  Hydra.Api.Infrastructure.Context.ServerContext server_context = 1;
  oneof session_data {
    string server_data = 2;
    Hydra.Api.SessionControl.ManagedSessionData managed_session_data = 3;
  }
}

message ActivateSession3Request {
  Hydra.Api.Infrastructure.Context.ServerContext server_context = 1;
  Hydra.Api.SessionControl.ServerInfo server_info = 2;
}

message ActivateSession3Response {
}

message ManagedSessionData {
  repeated Hydra.Api.Presence.GameVariant variants = 1;
  string session_data = 2;
  string playlist = 3;
}

message GetSessionMemberEventsRequest {
  Hydra.Api.Infrastructure.Context.ServerContext server_context = 1;
  int64 last_event_id = 2;
}

message GetSessionEventsRequest {
  Hydra.Api.Infrastructure.Context.ServerContext server_context = 1;
  int64 last_session_member_event_id = 2;
  int64 last_session_data_event_id = 3;
}

message GetSessionMemberEventsResponse {
  repeated Hydra.Api.SessionControl.SessionMemberEvent events = 1;
  int64 last_event_id = 2;
}

message SessionMemberEvents {
  repeated Hydra.Api.SessionControl.SessionMemberEvent events = 1;
  int64 last_event_id = 2;
}

message SessionDataEvent {
  int64 sequence_id = 1;
  Hydra.Api.Nullable.NullableString play_list_id = 2;
  repeated Hydra.Api.Presence.GameVariant variants = 3;
  Hydra.Api.Presence.MatchmakeSessionSettings settings = 4;
  Hydra.Api.Nullable.NullableString data = 5;
  repeated Hydra.Api.Push.Presence.PresenceSessionMemberUpdate members_update = 6;
}

message SessionDataEvents {
  repeated Hydra.Api.SessionControl.SessionDataEvent events = 1;
  int64 last_event_id = 2;
}

message GetSessionEventsResponse {
  Hydra.Api.SessionControl.SessionMemberEvents session_member_events = 1;
  Hydra.Api.SessionControl.SessionDataEvents session_data_events = 2;
}

message HeartbeatSessionRequest {
  Hydra.Api.Infrastructure.Context.ServerContext server_context = 1;
}

message HeartbeatSessionResponse {
  int32 refresh_after_seconds = 1;
}

message ProcessSessionMemberEventsRequest {
  Hydra.Api.Infrastructure.Context.ServerContext server_context = 1;
  repeated Hydra.Api.SessionControl.SessionMemberEventResult list = 2;
}

message ProcessSessionMemberEventsResponse {
}

message FinishSessionRequest {
  Hydra.Api.Infrastructure.Context.ServerContext server_context = 1;
}

message FinishSessionResponse {
}

message GetDataCenterEchoEndpointsRequest {
  Hydra.Api.Infrastructure.Context.UserContext user_context = 1;
  string client_version = 2;
}

message GetDataCenterEchoEndpointsResponse {
  repeated Hydra.Api.SessionControl.DataCenterEchoEndpoints endpoints = 1;
}

message SessionKeyValue {
  string key = 1;
  string value = 2;
}

message HeartbeatServerTags {
  repeated string list = 1;
}

message HeartbeatServerKeyValue {
  repeated Hydra.Api.SessionControl.SessionKeyValue list = 1;
}

message HeartbeatServerMembers {
  repeated string list = 1;
}

message ServerBrowsingSessionData {
  Hydra.Api.Nullable.NullableString game_mode = 1;
  Hydra.Api.Nullable.NullableString game_map = 2;
  Hydra.Api.Nullable.NullableString server_name = 3;
  Hydra.Api.Nullable.NullableBool password_protected = 4;
  Hydra.Api.Nullable.NullableInt max_player_count = 5;
  Hydra.Api.SessionControl.HeartbeatServerTags tags = 6;
  Hydra.Api.SessionControl.HeartbeatServerKeyValue key_values = 7;
  Hydra.Api.SessionControl.HeartbeatServerMembers members = 8;
}

message ServerData {
  Hydra.Api.SessionControl.ServerBrowsingSessionData session_data = 1;
  Hydra.Api.SessionControl.ServerInfo server_info = 2;
  string kernel_session_id = 3;
}

message BrowseServersResponse {
  int32 slots_total = 1;
  int32 slots_occupied = 2;
  repeated Hydra.Api.SessionControl.ServerData servers = 3;
  Pros.Global.Api.ContinuationToken.ContinuationToken continuation_token = 4;
}

message HeartbeatServerData {
  Hydra.Api.SessionControl.ServerBrowsingSessionData data = 1;
}

message CreateServerRequest {
  string server_token = 1;
  string client_version = 2;
  Hydra.Api.SessionControl.ServerBrowsingSessionData create_data = 3;
  Hydra.Api.SessionControl.ServerInfo server_info = 4;
}

message CreateServerResponse {
  Hydra.Api.Infrastructure.Context.ServerContext server_context = 1;
}

message HeartbeatServerRequest {
  Hydra.Api.Infrastructure.Context.ServerContext server_context = 1;
  Hydra.Api.SessionControl.HeartbeatServerData update = 2;
}

message HeartbeatServerResponse {
  int32 refresh_after_seconds = 1;
}

message BrowseServersRequest {
  Hydra.Api.Infrastructure.Context.UserContext user_context = 1;
  string client_version = 2;
  Pros.Global.Api.ContinuationToken.ContinuationToken continuation_token = 3;
}

message DestroyServerRequest {
  Hydra.Api.Infrastructure.Context.ServerContext server_context = 1;
}

message DestroyServerResponse {
}

message ManagedRemoveMembersRequest {
  Hydra.Api.Infrastructure.Context.ServerContext server_context = 1;
  repeated string user_ids = 2;
}

message ManagedSetUserPendingRequest {
  Hydra.Api.Infrastructure.Context.ServerContext server_context = 1;
  Hydra.Api.Infrastructure.Context.UserContext user_context = 2;
}

message ManagedSetUserPendingResponse {
}

message ManagedRemoveMembersResponse {
}