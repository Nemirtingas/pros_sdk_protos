syntax = "proto3";

import "ServerManagerScheduler/PendingSession.proto";
import "Context/ToolContext.proto";

package Hydra.Api.ServerManagerConfiguration;

message RegisterRequest {
  ToolContext context = 1;
  string version = 2;
}

message RegisterResponse {
  string id = 1;
}

message UnregisterRequest {
  ToolContext context = 1;
  string id = 2;
}

message UnregisterResponse {
}

message GetPendingSessionsRequest {
  ToolContext context = 1;
  string server_manager_id = 2;
}

message GetPendingSessionsResponse {
  repeated PendingSession sessions = 1;
  int32 refresh_after_seconds = 2;
}

message RejectPendingSessionRequest {
  ToolContext context = 1;
  string server_manager_id = 3;
  PendingSession session = 4;
}

message RejectPendingSessionResponse {
}

