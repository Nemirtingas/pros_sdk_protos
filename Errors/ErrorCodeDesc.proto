syntax = "proto3";

import "google/protobuf/descriptor.proto";

package Hydra.Api.Infrastructure.Errors;

enum ErrorCategory {
  ERROR_CATEGORY_FATAL = 0;
  ERROR_CATEGORY_CRITICAL = 1;
  ERROR_CATEGORY_TERMINAL = 2;
  ERROR_CATEGORY_NONE = 3;
}

enum ErrorSeverity {
  ERROR_SEVERITY_UNDEFINED = 0;
  ERROR_SEVERITY_FATAL = 1;
  ERROR_SEVERITY_CRITICAL = 2;
  ERROR_SEVERITY_MAJOR = 3;
  ERROR_SEVERITY_MINOR = 4;
  ERROR_SEVERITY_EXPECTED = 5;
}

message ErrorCodeDesc {
  string error_text = 1;
  ErrorSeverity error_severity = 2;
  ErrorCategory error_category = 3;
}

