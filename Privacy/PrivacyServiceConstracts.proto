syntax = "proto3";

import "Context/UserContext.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

package Hydra.Api.Privacy;

enum PrivacyType {
  PRIVACY_TYPE_NONE = 0;
  PRIVACY_TYPE_FRIENDS = 1;
  PRIVACY_TYPE_ALL = 2;
}

enum BlockCommunicationType {
  BLOCK_COMMUNICATION_TYPE_NONE = 0;
  BLOCK_COMMUNICATION_TYPE_MESSAGING = 1;
  BLOCK_COMMUNICATION_TYPE_MATCHMAKING = 2;
}

message GetPrivacyTypeRequest {
  Hydra.Api.Infrastructure.Context.UserContext context = 1;
}

message GetPrivacyTypeResponse {
  Hydra.Api.Privacy.PrivacyType privacy_type = 1;
}

message SetPrivacyTypeRequest {
  Hydra.Api.Infrastructure.Context.UserContext context = 1;
  Hydra.Api.Privacy.PrivacyType privacy_type = 2;
}

message SetPrivacyTypeResponse {
}

message CommunicationBlock {
  Hydra.Api.Privacy.BlockCommunicationType type = 1;
  google.protobuf.Timestamp created = 2;
  google.protobuf.Timestamp expiration_date = 3;
}

message BlockedUser {
  string user_id = 1;
  repeated Hydra.Api.Privacy.CommunicationBlock blocks = 2;
  string custom_data = 3;
}

message AddBlockedUserRequest {
  Hydra.Api.Infrastructure.Context.UserContext context = 1;
  string user_id = 2;
  repeated Hydra.Api.Privacy.BlockCommunicationType types = 3;
  string custom_data = 4;
  google.protobuf.Duration block_duration = 5;
}

message AddBlockedUserResponse {
}

message RemoveBlockedUserRequest {
  Hydra.Api.Infrastructure.Context.UserContext context = 1;
  string user_id = 2;
  repeated Hydra.Api.Privacy.BlockCommunicationType types = 3;
}

message RemoveBlockedUserResponse {
}

message GetBlockedUsersRequest {
  Hydra.Api.Infrastructure.Context.UserContext context = 1;
  int32 from = 2;
  int32 count = 3;
}

message GetBlockedUsersResponse {
  int32 total_count = 1;
  repeated Hydra.Api.Privacy.BlockedUser users = 2;
}

message PrivacyConnectRequest {
  Hydra.Api.Infrastructure.Context.UserContext context = 1;
}

message PrivacyConnectResponse {
}

message PrivacyDisconnectRequest {
  Hydra.Api.Infrastructure.Context.UserContext context = 1;
}

message PrivacyDisconnectResponse {
}

message UpdateBlockedUserCustomDataRequest {
  Hydra.Api.Infrastructure.Context.UserContext context = 1;
  string user_id = 2;
  string custom_data = 3;
}

message UpdateBlockedUserCustomDataResponse {
}