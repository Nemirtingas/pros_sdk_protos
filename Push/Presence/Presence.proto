syntax = "proto3";

import "Presence/PartyStatus.proto";
import "Presence/MatchmakeStatus.proto";
import "Presence/InviteData.proto";
import "ErrorCode.proto";
import "Nullable/Nullable.proto";
import "Presence/PresenceServiceContracts.proto";

package Hydra.Api.Push.Presence;

enum InviteEventType {
  INVITE_EVENT_TYPE_UNKNOWN = 0;
  INVITE_EVENT_TYPE_INVITE_SENT = 1;
  INVITE_EVENT_TYPE_REVOKE_SENT = 2;
  INVITE_EVENT_TYPE_INVITE_RECEIVED = 3;
  INVITE_EVENT_TYPE_REVOKE_RECEIVED = 4;
  INVITE_EVENT_TYPE_INVITE_ACCEPTED = 5;
  INVITE_EVENT_TYPE_INVITE_REJECTED = 6;
  INVITE_EVENT_TYPE_ACCEPT_SUCCESS_RECEIVED = 7;
  INVITE_EVENT_TYPE_ACCEPT_FAIL_RECEIVED = 8;
  INVITE_EVENT_TYPE_REJECT_RECEIVED = 9;
}

enum PresenceUserDisconnectedReason {
  PRESENCE_USER_DISCONNECTED_REASON_NONE = 0;
  PRESENCE_USER_DISCONNECTED_REASON_TIMEOUT = 1;
}

enum PresenceSessionMemberUpdateType {
  PRESENCE_SESSION_MEMBER_UPDATE_TYPE_NONE = 0;
  PRESENCE_SESSION_MEMBER_UPDATE_TYPE_ADD = 1;
  PRESENCE_SESSION_MEMBER_UPDATE_TYPE_REMOVE = 2;
  PRESENCE_SESSION_MEMBER_UPDATE_TYPE_UPDATE = 3;
}

enum PresenceSessionType {
  PRESENCE_SESSION_TYPE_NONE = 0;
  PRESENCE_SESSION_TYPE_MANAGED = 1;
  PRESENCE_SESSION_TYPE_UNMANAGED = 2;
}

enum PresencePartyUpdateType {
  PRESENCE_PARTY_UPDATE_TYPE_NONE = 0;
  PRESENCE_PARTY_UPDATE_TYPE_ID = 1;
  PRESENCE_PARTY_UPDATE_TYPE_DATA = 2;
  PRESENCE_PARTY_UPDATE_TYPE_SETTINGS = 4;
  PRESENCE_PARTY_UPDATE_TYPE_MEMBERS = 8;
  PRESENCE_PARTY_UPDATE_TYPE_JOIN_CODE = 16;
}

enum PresencePartyMemberUpdateType {
  PRESENCE_PARTY_MEMBER_UPDATE_TYPE_NONE = 0;
  PRESENCE_PARTY_MEMBER_UPDATE_TYPE_ADD = 1;
  PRESENCE_PARTY_MEMBER_UPDATE_TYPE_REMOVE = 2;
  PRESENCE_PARTY_MEMBER_UPDATE_TYPE_UPDATE = 3;
}

message InviteEvent {
  Hydra.Api.Push.Presence.InviteEventType event_type = 1;
  Hydra.Api.Presence.InviteData data = 2;
  int32 sequence_id = 3;
}

message LongOperationResult {
  Pros.Global.Api.Errors.ErrorCode error_code = 1;
}

message LongOperationStatus {
  string correlation_id = 1;
  string user_id = 2;
  Hydra.Api.Push.Presence.LongOperationResult result = 3;
}

message PresenceUserDisconnected {
  Hydra.Api.Push.Presence.PresenceUserDisconnectedReason reason = 1;
}

message PresenceUserUpdate {
  repeated Hydra.Api.Push.Presence.InviteEvent invite_events = 1;
  Hydra.Api.Push.Presence.PresenceUserDisconnected user_disconnected = 3;
  Hydra.Api.Push.Presence.LongOperationStatus long_operation_status = 4;
  Hydra.Api.Presence.PenaltyInfo penalty_info = 5;
}

message PresenceSessionMemberUpdate {
  Hydra.Api.Push.Presence.PresenceSessionMemberUpdateType update_type = 2;
  Hydra.Api.Presence.SessionMember member_data = 3;
}

message PresenceSessionQueueData {
  string play_list_id = 1;
  repeated Hydra.Api.Presence.QueueVariants queue_variants = 2;
}

message PresenceSessionGameData {
  Hydra.Api.Nullable.NullableString play_list_id = 1;
  repeated Hydra.Api.Presence.GameVariant variants = 2;
  Hydra.Api.Presence.MatchmakeSessionSettings settings = 3;
  Hydra.Api.Nullable.NullableString data = 4;
  repeated Hydra.Api.Push.Presence.PresenceSessionMemberUpdate members_update = 5;
  string s_c_managed_context = 6;
  Hydra.Api.Push.Presence.PresenceSessionType session_type = 7;
  string turn_connection_context = 8;
  Hydra.Api.Nullable.NullableString join_code2 = 10;
  string data_center_id = 11;
}

message PresenceSessionUpdate {
  Hydra.Api.Presence.GameSessionId id = 1;
  Hydra.Api.Presence.MatchmakeState state = 2;
  Hydra.Api.Push.Presence.PresenceSessionQueueData queue_data = 3;
  Hydra.Api.Push.Presence.PresenceSessionGameData game_data = 4;
  Hydra.Api.Push.Presence.LongOperationStatus long_operation_status = 5;
  Hydra.Api.Presence.PendingSession pending_session = 6;
}

message PresencePartyUpdate {
  Hydra.Api.Presence.PartyId id = 2;
  Hydra.Api.Nullable.NullableString data = 3;
  Hydra.Api.Presence.PartySettings settings = 4;
  repeated Hydra.Api.Push.Presence.PresencePartyMemberUpdate members = 5;
  Hydra.Api.Nullable.NullableString join_code = 6;
  Hydra.Api.Push.Presence.LongOperationStatus long_operation_status = 7;
}

message PresencePartyMemberUpdate {
  Hydra.Api.Push.Presence.PresencePartyMemberUpdateType update_type = 1;
  Hydra.Api.Presence.PartyMember member = 2;
}