syntax = "proto3";

import "Push/PushVersion.proto";
import "Push/PushToken.proto";
import "Context/UserContext.proto";
import "Context/ServerContext.proto";

package Hydra.Api.Push;

message PushAuthorizationData {
  oneof context {
    int32 generation = 1;
    PushToken token = 2;
    repeated PushVersion versions = 3;
    UserContext user_context = 4;
    ServerContext server_context = 5;
  }
  int32 generation = 1;
  PushToken token = 2;
  repeated PushVersion versions = 3;
}

