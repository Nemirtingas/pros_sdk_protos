syntax = "proto3";

package Hydra.Api.Push.Signaling;

enum SignalingType {
  SIGNALING_TYPE_SIGNAL_UNKNOWN = 0;
  SIGNALING_TYPE_SIGNAL_P2P = 1;
  SIGNALING_TYPE_SIGNAL_RELIABLE_MESSAGE = 2;
  SIGNALING_TYPE_SIGNAL_RELIABLE_AFFIRMATIVE = 3;
  SIGNALING_TYPE_SIGNAL_PROBE = 4;
  SIGNALING_TYPE_SIGNAL_REDSTONE = 10;
  SIGNALING_TYPE_SIGNAL_VOICE = 11;
  SIGNALING_TYPE_SIGNAL_TEXT = 12;
  SIGNALING_TYPE_SIGNAL_DATA = 13;
  SIGNALING_TYPE_SIGNAL_TASK = 14;
  SIGNALING_TYPE_SIGNAL_APPLICATION_0 = 15;
  SIGNALING_TYPE_SIGNAL_APPLICATION_1 = 16;
  SIGNALING_TYPE_SIGNAL_APPLICATION_2 = 17;
  SIGNALING_TYPE_SIGNAL_APPLICATION_3 = 18;
  SIGNALING_TYPE_SIGNAL_APPLICATION_4 = 19;
}

message SignalingMessage {
  string message_id = 1;
  Hydra.Api.Push.Signaling.SignalingType type = 2;
  string user_id_from = 3;
  string user_id_to = 4;
  bytes data = 5;
}