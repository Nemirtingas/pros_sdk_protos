syntax = "proto3";

import "Context/UserContext.proto";
import "Authorization/AuthorizationContracts.proto";

package Hydra.Api.User;

message UsersPublicDataByProviderUserIdRequest {
  Hydra.Api.Infrastructure.Context.UserContext user_context = 1;
  Pros.Global.Api.Auth.Provider provider_id = 2;
  repeated string provider_user_id_list = 3;
}

message UsersPublicDataByProviderUserIdResponse {
  repeated Hydra.Api.User.UserBaseData data = 1;
}

message UsersPublicDataByUserIdRequest {
  Hydra.Api.Infrastructure.Context.UserContext user_context = 1;
  repeated string user_id_list = 2;
}

message UsersPublicDataByUserIdResponse {
  repeated Hydra.Api.User.UserBaseData data = 1;
}

message UserBaseData {
  string user_id = 1;
  string provider_user_id = 2;
  repeated Hydra.Api.User.UserBasePlatforms platforms = 3;
}

message UserBasePlatforms {
  Pros.Global.Api.Auth.Provider provider_id = 1;
  Pros.Global.Api.Auth.BuildPlatform platform = 4;
}