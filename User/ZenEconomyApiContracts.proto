syntax = "proto3";

import "Context/UserContext.proto";
import "Context/ConfigurationContext.proto";
import "User/EconomyContracts.proto";

package Hydra.Api.User.Zen;

message ApplyOffersRequest {
  UserContext user_context = 1;
  ConfigurationContext configuration_context = 2;
  repeated OfferListItem offers = 3;
}

message ApplyOffersResponse {
}

message ApplyDiscountOffersRequest {
  UserContext user_context = 1;
  ConfigurationContext configuration_context = 2;
  repeated DiscountOffer discount_offers = 3;
}

message ApplyDiscountOffersResponse {
}

message DiscountOffer {
  OfferListItem offer = 1;
  Int64Value price = 2;
  repeated string discounts = 3;
}

message SendPlaytimeEventsRequest {
  repeated PlaytimeEvent events = 1;
  UserContext user_context = 2;
}

message SendPlaytimeEventsResponse {
}

message PlaytimeEvent {
  string pit_id = 1;
  int32 active_seconds = 2;
}

