syntax = "proto3";

import "EndpointDispatcher/EndpointDispatcherContracts.proto";

package Hydra.Api.SessionControl;

message PendingSession {
  EndpointInfo auth_endpoint = 1;
  string hydra_auth_ticket = 2;
  string server_token = 3;
  string version = 4;
  string game_session_id = 5;
  string title_id = 6;
  repeated string excluded_dsm_ids = 7;
}

