syntax = "proto3";

import "ServerManagerScheduler/PendingSession.proto";

package Hydra.Api.ServerManagerScheduler;

enum SessionRejectReason {
  SESSION_REJECT_REASON_UNKNOWN = 0;
  SESSION_REJECT_REASON_NO_VERSION = 1;
  SESSION_REJECT_REASON_NOT_ENOUGH_RESOURCES = 2;
}

message RejectedPendingSession {
  string dsm_id = 1;
  string data_center_id = 2;
  PendingSession session = 3;
  SessionRejectReason reason = 4;
}

