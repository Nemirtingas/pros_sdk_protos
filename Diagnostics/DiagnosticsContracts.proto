syntax = "proto3";

import "Context/UserContext.proto";
import "Context/ServerContext.proto";
import "Context/ToolContext.proto";
import "ProsAccount/ProsAccountContracts.proto";

package Hydra.Api.Diagnostics;

enum CrashDumpType {
  CRASH_DUMP_TYPE_UNKNOWN = 0;
  CRASH_DUMP_TYPE_GAME_CLIENT = 1;
  CRASH_DUMP_TYPE_GAME_SERVER = 2;
  CRASH_DUMP_TYPE_MOD_EDITOR = 3;
}

enum DiagnosticsDataType {
  DIAGNOSTICS_DATA_TYPE_BINARY = 0;
  DIAGNOSTICS_DATA_TYPE_TEXT = 1;
}

message WriteCrashDumpUserRequest {
  Hydra.Api.Infrastructure.Context.UserContext user_context = 1;
  repeated Hydra.Api.Diagnostics.DiagnosticsProperty properties = 2;
  string dump_hash = 3;
  bytes data = 4;
  Hydra.Api.Diagnostics.DiagnosticsDataType data_type = 5;
  string provider = 6;
  string client_version = 7;
  string sdk_version = 8;
  string facts_session_id = 9;
}

message WriteCrashDumpUserResponse {
}

message WriteCrashDumpServerRequest {
  Hydra.Api.Infrastructure.Context.ServerContext server_context = 1;
  repeated Hydra.Api.Diagnostics.DiagnosticsProperty properties = 2;
  string dump_hash = 3;
  bytes data = 4;
  Hydra.Api.Diagnostics.DiagnosticsDataType data_type = 5;
  string version = 6;
  string sdk_version = 7;
}

message WriteCrashDumpServerResponse {
}

message WriteCrashDumpToolRequest {
  Hydra.Api.Infrastructure.Context.ToolContext tool_context = 1;
  repeated Hydra.Api.Diagnostics.DiagnosticsProperty properties = 2;
  string dump_hash = 3;
  bytes data = 4;
  Hydra.Api.Diagnostics.DiagnosticsDataType data_type = 5;
  string version = 6;
  string sdk_version = 7;
}

message WriteCrashDumpToolResponse {
}

message WriteCrashDumpModEditorRequest {
  Pros.Global.Api.Account.ProsAccountContext account_context = 1;
  repeated Hydra.Api.Diagnostics.DiagnosticsProperty properties = 2;
  string dump_hash = 3;
  bytes data = 4;
  Hydra.Api.Diagnostics.DiagnosticsDataType data_type = 5;
  string version = 6;
  string sdk_version = 7;
}

message WriteCrashDumpModEditorResponse {
}

message DiagnosticsProperty {
  string name = 1;
  string value = 2;
}