syntax = "proto3";

import "Context/UserContext.proto";
import "Context/ToolContext.proto";
import "Context/ServerContext.proto";
import "google/protobuf/descriptor.proto";

package Pros.Api.Facts;

enum FactsPackFormat {
  FACTS_PACK_FORMAT_UNKNOWN = 0;
  FACTS_PACK_FORMAT_NET_CLIENT_PACK = 1;
  FACTS_PACK_FORMAT_PRINTF_RAW = 2;
}

enum ContextValue {
  CONTEXT_VALUE_UNKNOWN = 0;
  CONTEXT_VALUE_GLOBAL_CONTEXT_UPDATE = 1;
  CONTEXT_VALUE_GLOBAL_CONTEXT_REMOVE = 2;
  CONTEXT_VALUE_SDK_VERSION = 3;
  CONTEXT_VALUE_CLIENT_VERSION = 4;
  CONTEXT_VALUE_PLATFORM = 5;
  CONTEXT_VALUE_KERNEL_SESSION_ID = 6;
  CONTEXT_VALUE_KSIVA = 7;
  CONTEXT_VALUE_GAME_CONFIGURATION = 8;
  CONTEXT_VALUE_ROLE = 9;
  CONTEXT_VALUE_TITLE_ID = 10;
  CONTEXT_VALUE_ENVIRONMENT_ID = 11;
  CONTEXT_VALUE_USER_ID = 12;
  CONTEXT_VALUE_ACCOUNT_NAME = 13;
  CONTEXT_VALUE_PROVIDER = 14;
  CONTEXT_VALUE_SDK_CONFIGURATION = 15;
  CONTEXT_VALUE_PARTY_SESSION_ID = 16;
  CONTEXT_VALUE_MATCHMAKE_SESSION_ID = 17;
  CONTEXT_VALUE_DEDICATED_SERVER_ID = 18;
  CONTEXT_VALUE_PARTY_JOIN_CODE = 19;
  CONTEXT_VALUE_APPLICATION_NAME = 20;
  CONTEXT_VALUE_RUNTIME_SEANCE_ID = 21;
  CONTEXT_VALUE_MATCHMAKE_SESSION_JOIN_CODE = 22;
  CONTEXT_VALUE_IMMEDIATE_CONTEXT_ERROR_SDK = 1000;
  CONTEXT_VALUE_IMMEDIATE_CONTEXT_ERROR_APP = 1001;
  CONTEXT_VALUE_IMMEDIATE_CONTEXT_WARNING_SDK = 1002;
  CONTEXT_VALUE_IMMEDIATE_CONTEXT_WARNING_APP = 1003;
  CONTEXT_VALUE_IMMEDIATE_CONTEXT_ERROR_PROS = 1004;
  CONTEXT_VALUE_IMMEDIATE_CONTEXT_ERROR_PROS_CORRELATION_ID = 1005;
}

enum FactRole {
  FACT_ROLE_GAME_CLIENT = 0;
  FACT_ROLE_GAME_SERVER = 1;
}

message WriteBinaryPackUserRequest {
  Hydra.Api.Infrastructure.Context.UserContext user_context = 1;
  bytes entries = 2;
  bytes data = 3;
  Pros.Api.Facts.FactsPackHeader header = 4;
}

message WriteBinaryPackUserResponse {
}

message FactsPackHeader {
  repeated Pros.Api.Facts.FactsContext context = 2;
  int32 pack_number = 3;
  int64 start_time = 4;
  int64 end_time = 5;
  int64 init_time = 6;
  Pros.Api.Facts.FactsPackFormat format = 7;
  Pros.Api.Facts.FactsPackFormatVersion version = 8;
  Pros.Api.Facts.FactsPackOptions options = 9;
  string fact_session_id = 10;
}

message FactsPackOptions {
  bool is_final = 1;
  bool is_local_time = 2;
  bool is_compressed = 3;
}

message FactsContext {
  string property_name = 1;
  string property_value = 2;
}

message FactsPackFormatVersion {
  int32 major = 1;
  int32 minor = 2;
}

message FactsDescription {
  string value = 1;
}

message WriteBinaryPackToolRequest {
  Hydra.Api.Infrastructure.Context.ToolContext tool_context = 1;
  bytes entries = 2;
  bytes data = 3;
  Pros.Api.Facts.FactsPackHeader header = 4;
}

message WriteBinaryPackToolResponse {
}

message WriteBinaryPackServerRequest {
  Hydra.Api.Infrastructure.Context.ServerContext server_context = 1;
  bytes entries = 2;
  bytes data = 3;
  Pros.Api.Facts.FactsPackHeader header = 4;
}

message WriteBinaryPackServerResponse {
}