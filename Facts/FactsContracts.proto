syntax = "proto3";

import "Options.proto";
import "Context/UserContext.proto";
import "Context/ToolContext.proto";
import "Context/ServerContext.proto";

package Hydra.Api.Facts;

enum FactsPackFormat {
  FACTS_PACK_FORMAT_UNKNOWN = 0;
  FACTS_PACK_FORMAT_NET_CLIENT_PACK = 1;
  FACTS_PACK_FORMAT_PRINTF_RAW = 2;
}

enum ContextValue {
  CONTEXT_VALUE_UNKNOWN = 0;
  CONTEXT_VALUE_GLOBAL_CONTEXT_UPDATE = 1;
  CONTEXT_VALUE_GLOBAL_CONTEXT_REMOVE = 2;
  CONTEXT_VALUE_SDK_VERSION = 3;
  CONTEXT_VALUE_CLIENT_VERSION = 4;
  CONTEXT_VALUE_PLATFORM = 5;
  CONTEXT_VALUE_KERNEL_SESSION_ID = 6;
  CONTEXT_VALUE_KSIVA = 7;
  CONTEXT_VALUE_GAME_CONFIGURATION = 8;
  CONTEXT_VALUE_ROLE = 9;
  CONTEXT_VALUE_TITLE_ID = 10;
  CONTEXT_VALUE_ENVIRONMENT_ID = 11;
  CONTEXT_VALUE_USER_ID = 12;
  CONTEXT_VALUE_ACCOUNT_NAME = 13;
  CONTEXT_VALUE_PROVIDER = 14;
}

enum FactRole {
  FACT_ROLE_GAME_CLIENT = 0;
  FACT_ROLE_GAME_SERVER = 1;
}

message WriteBinaryPackUserRequest {
  UserContext user_context = 1;
  bytes entries = 2;
  bytes data = 3;
  FactsPackHeader header = 4;
}

message WriteBinaryPackUserResponse {
}

message FactsPackHeader {
  repeated FactsContext context = 2;
  int32 pack_number = 3;
  int64 start_time = 4;
  int64 end_time = 5;
  int64 init_time = 6;
  FactsPackFormat format = 7;
  FactsPackFormatVersion version = 8;
  FactsPackOptions options = 9;
}

message FactsPackOptions {
  bool is_final = 1;
  bool is_local_time = 2;
  bool is_compressed = 3;
}

message FactsContext {
  string property_name = 1;
  string property_value = 2;
}

message FactsPackFormatVersion {
  int32 major = 1;
  int32 minor = 2;
}

message WriteBinaryPackToolRequest {
  ToolContext tool_context = 1;
  bytes entries = 2;
  bytes data = 3;
  FactsPackHeader header = 4;
}

message WriteBinaryPackToolResponse {
}

message WriteBinaryPackServerRequest {
  ServerContext server_context = 1;
  bytes entries = 2;
  bytes data = 3;
  FactsPackHeader header = 4;
}

message WriteBinaryPackServerResponse {
}

