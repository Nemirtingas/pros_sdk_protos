syntax = "proto3";

import "Context/UserContext.proto";
import "Context/ServerContext.proto";

package Hydra.Api.Telemetry;

enum TelemetryPackFormat {
  TELEMETRY_PACK_FORMAT_UNKNOWN = 0;
  TELEMETRY_PACK_FORMAT_JSON_BASED = 1;
}

enum TelemetryPackCompression {
  TELEMETRY_PACK_COMPRESSION_NONE = 0;
  TELEMETRY_PACK_COMPRESSION_ZLIB = 1;
  TELEMETRY_PACK_COMPRESSION_GZIP = 2;
}

message SendTelemetryEventsRequest {
  repeated string events = 1;
  UserContext user_context = 2;
}

message SendTelemetryEventsResponse {
}

message SendTelemetryPackRequest {
  UserContext user_context = 1;
  TelemetryPackHeader header = 2;
  bytes entries = 3;
  bytes data = 4;
  int32 event_generation = 5;
}

message SendTelemetryPackResponse {
}

message TelemetryPackHeader {
  repeated TelemetryContext context = 1;
  int32 pack_number = 2;
  int64 start_time = 3;
  int64 end_time = 4;
  int64 init_time = 5;
  TelemetryPackFormat format = 7;
  TelemetryPackFormatVersion version = 8;
  TelemetryPackOptions options = 9;
}

message TelemetryPackOptions {
  bool is_local_time = 2;
  TelemetryPackCompression compression = 4;
}

message TelemetryContext {
  string property_name = 1;
  string property_value = 2;
}

message TelemetryPackFormatVersion {
  int32 major = 1;
  int32 minor = 2;
}

message TelemetryEventBaseEntry {
  string event_type = 1;
  string event_uid = 2;
  int32 version = 3;
  string json_params = 4;
}

message SendTelemetryServerEventsRequest {
  ServerContext server_context = 1;
  repeated string events = 2;
}

message SendTelemetryServerEventsResponse {
}

