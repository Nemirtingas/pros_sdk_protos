syntax = "proto3";

import "Context/UserContext.proto";

package RedLynx.Api.Account;

enum QRCodeSystemMode {
  QR_CODE_SYSTEM_MODE_NORMAL = 0;
  QR_CODE_SYSTEM_MODE_TURN_OFF = 1;
}

enum LinkStatus {
  LINK_STATUS_UNKNOWN = 0;
  LINK_STATUS_NOT_LINKED = 1;
  LINK_STATUS_LINKED = 2;
  LINK_STATUS_CODE_TIMEOUT = 3;
  LINK_STATUS_CODE_READ = 4;
}

message GetRegistrationQRCodeRequest {
  UserContext user_context = 1;
}

message GetRegistrationQRCodeResponse {
  QRCodeConfig config = 7;
  string registration_link = 1;
  bytes qr_code_png = 2;
  string code = 3;
  LinkStatus link_status = 4;
  int32 expiration_in_seconds = 5;
  repeated RetrievalInterval retrieval_intervals = 6;
  AccountInfo account_info = 8;
}

message QRCodeConfig {
  QRCodeSystemMode system_mode = 1;
}

message RetrievalInterval {
  int32 order = 1;
  int32 duration_in_seconds = 2;
  int32 delay_in_seconds = 3;
}

message GetRegistrationStatusRequest {
  UserContext user_context = 1;
  string code = 2;
}

message GetRegistrationStatusResponse {
  LinkStatus link_status = 1;
  AccountInfo account_info = 2;
}

message AccountInfo {
  string username = 1;
  string username_postfix = 2;
  string avatar_link = 3;
}

