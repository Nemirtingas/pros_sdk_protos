syntax = "proto3";

import "Context/UserContext.proto";
import "Auth/AuthorizationContracts.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

package RedLynx.Api.CrossSave;

message SubmitSnapshotRequest {
  UserContext user_context = 1;
  SaveSnapshot snapshot = 2;
}

message SubmitSnapshotResponse {
  Duration cooldown = 1;
}

message GetTransferInfoRequest {
  UserContext user_context = 1;
}

message GetTransferInfoResponse {
  string transfer_id = 1;
  string content_type = 2;
  string data_description_json = 3;
  Platform platform = 4;
  Provider provider = 5;
  Timestamp save_created_at = 6;
  Timestamp transfer_created_at = 7;
}

message CompleteTransferRequest {
  UserContext user_context = 1;
  string transfer_id = 2;
  SaveSnapshot backup_snapshot = 3;
}

message CompleteTransferResponse {
  SaveSnapshot transfer_snapshot = 1;
}

message SkipTransferRequest {
  UserContext user_context = 1;
  string transfer_id = 2;
}

message SkipTransferResponse {
}

message SaveSnapshot {
  repeated SaveData saves = 1;
  string content_type = 2;
  string data_description_json = 3;
}

message SaveData {
  string key = 1;
  bytes data = 2;
}

