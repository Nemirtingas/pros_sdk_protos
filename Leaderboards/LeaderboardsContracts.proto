syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "Context/UserContext.proto";
import "Context/ServerContext.proto";

package Hydra.Api.Leaderboards;

message LeaderboardEntry {
  string user_id = 1;
  double rating = 2;
  int32 position = 3;
  Timestamp last_updated = 4;
  string custom_data = 5;
  int32 count = 6;
}

message LeaderboardData {
  string leaderboard_id = 1;
  repeated LeaderboardEntry entries = 2;
  LeaderboardEntry self_data = 3;
  int32 total_count = 4;
}

message LeaderboardRequest {
  string leaderboard_id = 2;
  int32 start_position = 3;
  int32 results_count = 4;
}

message GetLeaderboardsRequest {
  UserContext context = 1;
  repeated LeaderboardRequest requests = 2;
}

message GetLeaderboardsResponse {
  repeated LeaderboardData results = 1;
}

message GetLeaderboardFilteredRequest {
  UserContext context = 1;
  string leaderboard_id = 2;
  repeated string user_ids = 3;
}

message GetLeaderboardFilteredResponse {
  LeaderboardData data = 1;
}

message UpdateEntry {
  string user_id = 1;
  double value = 2;
  string custom_data = 3;
}

message UpdateLeaderboardUserRequest {
  UserContext context = 1;
  string leaderboard_id = 2;
  repeated UpdateEntry entries = 3;
}

message UpdateLeaderboardUserResponse {
}

message UpdateLeaderboardServerRequest {
  ServerContext context = 1;
  string leaderboard_id = 2;
  repeated UpdateEntry entries = 3;
}

message UpdateLeaderboardServerResponse {
}

